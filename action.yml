name: "Pie Build Uploader"
description: "Upload iOS/Android simulator builds to Pie"
author: "Pie"

inputs:
  pie_api_key:
    description: "Pie API Key for authentication"
    required: true
  build_path:
    description: "Path to the build file (APK, APP, AAB, or ZIP)"
    required: true

outputs:
  build_id:
    description: "The buildID returned by the Pie API. Pass this to subsequent steps (e.g. the run_tests_on_target MCP tool) to identify the uploaded build."
    value: ${{ steps.upload.outputs.build_id }}

runs:
  using: "composite"
  steps:
    - name: Check build file exists
      shell: bash
      id: build_check
      run: |
        # Check if path exists
        if [ ! -e "${{ inputs.build_path }}" ]; then
          echo "Error: Path does not exist: ${{ inputs.build_path }}"
          exit 1
        fi

        # Handle directory case
        if [ -d "${{ inputs.build_path }}" ]; then
          echo "Directory detected, creating zip archive..."
          
          # Get absolute paths
          abs_build_path=$(realpath "${{ inputs.build_path }}")
          dir_name=$(basename "$abs_build_path")
          parent_dir=$(dirname "$abs_build_path")
          zip_path="$parent_dir/$dir_name.zip"
          
          echo "Source directory: $abs_build_path"
          echo "Creating zip at: $zip_path"
          
          # Ensure we're in the parent directory
          cd "$parent_dir"
          
          # Create zip with verbose output
          zip -r "$zip_path" "$dir_name"
          if [ $? -ne 0 ]; then
            echo "Error: Failed to create zip archive"
            exit 1
          fi
          
          # Verify zip was created
          if [ ! -f "$zip_path" ]; then
            echo "Error: Zip archive was not created at $zip_path"
            exit 1
          fi
          
          echo "Created zip archive at $zip_path"
          echo "build_path=$zip_path" >> $GITHUB_OUTPUT
        else
          # Handle file case
          if [ ! -f "${{ inputs.build_path }}" ]; then
            echo "Error: Path exists but is not a file: ${{ inputs.build_path }}"
            exit 1
          fi
          echo "build_path=${{ inputs.build_path }}" >> $GITHUB_OUTPUT
        fi

    - name: Upload build to Pie
      id: upload
      shell: bash
      run: |
        build_path="${{ steps.build_check.outputs.build_path }}"
        echo "Using build path: $build_path"

        # Verify file exists and is readable
        if [ ! -f "$build_path" ] || [ ! -r "$build_path" ]; then
          echo "Error: Build file not found or not readable at $build_path"
          exit 1
        fi

        # Check file extension (case insensitive)
        if [[ ! "$(echo "$build_path" | tr '[:upper:]' '[:lower:]')" =~ \.(apk|app|aab|zip)$ ]]; then
          echo "Error: Build file must be an APK, APP, AAB, or ZIP file"
          echo "Current file: $build_path"
          exit 1
        fi

        # Upload the build. Write the response body to a temp file and capture
        # the HTTP status separately so we can parse the JSON cleanly without
        # log noise interleaving (the old `curl ... 2>&1` mashed everything
        # together, making JSON parsing impossible).
        echo "Uploading build to Pie API..."
        response_file=$(mktemp)
        trap 'rm -f "$response_file"' EXIT

        curl_opts=(-sS -X POST
          -H "X-API-Key: ${{ inputs.pie_api_key }}"
          -F "file=@$build_path"
          -o "$response_file"
          -w "%{http_code}")
        if [ "${DEBUG}" = "true" ]; then curl_opts+=(-v); fi

        http_code=$(curl "${curl_opts[@]}" https://api.pie.inc/v1/app/builds)
        curl_exit=$?

        echo "Response from Pie API:"
        cat "$response_file"
        echo ""
        echo "HTTP status code: $http_code"

        if [ $curl_exit -ne 0 ]; then
          echo "Error: curl failed with exit code $curl_exit"
          exit 1
        fi

        if [ "$http_code" != "201" ]; then
          echo "Error: Failed to upload build - HTTP $http_code (expected 201 Created)"
          exit 1
        fi

        # Extract the buildID from the JSON response. The api returns
        # { success, status, message, data: { buildID, downloadUrl, ... } }.
        # jq is preinstalled on all GitHub-hosted runners (ubuntu/macos).
        build_id=$(jq -r '.data.buildID // empty' < "$response_file")
        if [ -z "$build_id" ]; then
          echo "Error: upload succeeded but response had no .data.buildID — refusing to emit empty output"
          exit 1
        fi

        echo "Successfully uploaded build to Pie. buildID=$build_id"
        echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

branding:
  icon: "upload-cloud"
  color: "green"
